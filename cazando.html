<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="cazando.css">
  <title>Juego Cazando</title>
</head>
<body onload="iniciarJuego();">

  <h1>Juego Cazando</h1>
  <p class="autor">Autor: Alejandro Salazar</p>

  <canvas id="areaJuego" width="500" height="500"></canvas>

  <div class="controles">
    <div class="fila">
      <button>↑</button>
    </div>
    <div class="fila">
      <button>←</button>
      <button>↓</button>
      <button>→</button>
    </div>
  </div>

  <div class="panel">
    <span>Puntos: <span id="puntos">0</span></span>
    <span>Tiempo: <span id="tiempo">15</span></span>
  </div>

  <p id="mensaje"></p>

  <script src="cazando.js"></script>
</body>
</html>
