<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persecución Justa - Huye del Cazador</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 40%, #1a3f2c, #0a1f12);
      font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .game-container {
      background: rgba(0, 0, 0, 0.55);
      border-radius: 70px;
      padding: 25px 35px 35px 35px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.7), inset 0 1px 4px rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(2px);
    }

    .game-card {
      background: #1f2e26c9;
      border-radius: 55px;
      padding: 20px 20px 25px 20px;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin: 0 0 5px 0;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #F9D976, #F39F86, #FF6A88);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .autor {
      text-align: center;
      font-size: 0.9rem;
      color: #c8f0d0;
      margin-bottom: 18px;
      font-style: italic;
      letter-spacing: 1px;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 35px;
      box-shadow: 0 12px 28px black, inset 0 0 0 3px rgba(255,200,100,0.5);
      cursor: pointer;
      background: #2a4635;
    }

    .controles-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 22px;
      flex-wrap: wrap;
      gap: 18px;
    }

    .stats {
      background: #0a1912dd;
      padding: 8px 22px;
      border-radius: 50px;
      display: flex;
      gap: 35px;
      font-weight: bold;
      font-size: 1.35rem;
      color: #ffea9e;
      box-shadow: inset 0 1px 3px #00000066, 0 6px 12px rgba(0,0,0,0.4);
    }

    .stats span {
      background: #000000aa;
      padding: 5px 18px;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }

    .stats span:first-child {
      color: #ffd966;
    }

    .stats span:last-child {
      color: #7ef0b0;
    }

    .touch-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: #00000077;
      padding: 12px 20px;
      border-radius: 70px;
      backdrop-filter: blur(8px);
    }

    .row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .ctrl-btn {
      width: 65px;
      height: 65px;
      font-size: 28px;
      font-weight: bold;
      background: #2c2e3a;
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 0 #121212;
      transition: 0.07s linear;
      font-family: monospace;
    }

    .ctrl-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #121212;
    }

    #mensaje {
      text-align: center;
      font-size: 1.7rem;
      font-weight: bold;
      margin-top: 15px;
      background: #000000aa;
      display: inline-block;
      width: auto;
      padding: 6px 24px;
      border-radius: 60px;
      letter-spacing: 2px;
      backdrop-filter: blur(12px);
    }

    .reset-btn {
      background: #f05454;
      border: none;
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.2rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 8px black;
    }

    .reset-btn:hover {
      background: #ff7a3c;
      transform: scale(1.02);
    }

    footer {
      display: flex;
      justify-content: center;
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="game-card">
    <h1>🏃 PERSECUCIÓN ÉPICA 🎯</h1>
    <div class="autor">⚡ El depredador te persigue... ¡pero puedes escapar si eres ágil!</div>

    <canvas id="areaJuego" width="750" height="550"></canvas>

    <div class="controles-panel">
      <div class="stats">
        <span>⭐ Puntos: <span id="puntos">0</span></span>
        <span>⏱️ Tiempo: <span id="tiempo">25</span></span>
      </div>
      <div class="touch-controls">
        <div class="row">
          <button class="ctrl-btn" data-dir="up">▲</button>
        </div>
        <div class="row">
          <button class="ctrl-btn" data-dir="left">◀</button>
          <button class="ctrl-btn" data-dir="down">▼</button>
          <button class="ctrl-btn" data-dir="right">▶</button>
        </div>
      </div>
      <button class="reset-btn" id="resetGameBtn">🔄 REINICIAR</button>
    </div>
    <div id="mensaje" style="color: #ffbb77; text-shadow: 0 0 5px #aa4400;"></div>
    <footer style="color:#c0cfc0;">✨ Flechas del teclado o botones | El grande te persigue (velocidad justa) | Sobrevive 25 segundos</footer>
  </div>
</div>

<script>
  (function(){
    // ----- DOM -----
    const canvas = document.getElementById("areaJuego");
    const ctx = canvas.getContext("2d");
    const puntosSpan = document.getElementById("puntos");
    const tiempoSpan = document.getElementById("tiempo");
    const mensajeDiv = document.getElementById("mensaje");
    
    // ----- Dimensiones canvas -----
    const CANVAS_W = canvas.width;
    const CANVAS_H = canvas.height;
    
    // ----- Tamaños de los cuadros -----
    const ANCHO_DEPREDADOR = 58;   // grande
    const ALTO_DEPREDADOR = 58;
    const ANCHO_JUGADOR = 38;      // pequeño
    const ALTO_JUGADOR = 38;
    
    // Variables de estado
    let jugadorX = 0;
    let jugadorY = 0;
    let depredadorX = 0;
    let depredadorY = 0;
    
    let puntos = 0;
    let tiempoRestante = 25;   // tiempo para ganar (25 segundos)
    let juegoActivo = true;
    
    let intervaloJuego = null;          // control de tiempo y puntos
    let intervaloPersecucion = null;    // movimiento de persecución del depredador
    
    const VEL_JUGADOR = 22;      // movimiento rápido del jugador
    
    // ----- Velocidad del depredador (persecución justa, no demasiado rápida) -----
    const VEL_DEPREDADOR = 4.2;   // velocidad balanceada: te alcanza si te descuidas, pero puedes huir
    
    // ----- Funciones de dibujo con estilo atractivo -----
    function dibujarFondo() {
      // Gradiente profundo de selva
      const grad = ctx.createLinearGradient(0, 0, CANVAS_W, CANVAS_H);
      grad.addColorStop(0, '#1e5631');
      grad.addColorStop(1, '#0c2b18');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      
      // cuadrícula dinámica
      ctx.strokeStyle = '#8bc34a30';
      ctx.lineWidth = 1;
      for (let i = 0; i < CANVAS_W; i += 45) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, CANVAS_H);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(CANVAS_W, i);
        ctx.stroke();
      }
      
      // detalles de luz
      ctx.fillStyle = "#c0ffb030";
      for(let i=0;i<80;i++) {
        ctx.beginPath();
        ctx.arc( (i*173)%CANVAS_W, (i*257)%CANVAS_H, 2.5, 0, Math.PI*2);
        ctx.fill();
      }
    }
    
    function dibujarJugador() {
      ctx.shadowColor = "rgba(0,0,0,0.5)";
      ctx.shadowBlur = 8;
      // Jugador brillante dorado/naranja
      const grad = ctx.createLinearGradient(jugadorX, jugadorY, jugadorX + ANCHO_JUGADOR, jugadorY + ALTO_JUGADOR);
      grad.addColorStop(0, '#FFE484');
      grad.addColorStop(1, '#F5A623');
      ctx.fillStyle = grad;
      ctx.fillRect(jugadorX, jugadorY, ANCHO_JUGADOR, ALTO_JUGADOR);
      ctx.strokeStyle = '#FFD966';
      ctx.lineWidth = 2.5;
      ctx.strokeRect(jugadorX, jugadorY, ANCHO_JUGADOR, ALTO_JUGADOR);
      
      // Carita simpática
      ctx.fillStyle = "#2d1f00";
      ctx.beginPath();
      ctx.arc(jugadorX + ANCHO_JUGADOR*0.7, jugadorY + ALTO_JUGADOR*0.35, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(jugadorX + ANCHO_JUGADOR*0.3, jugadorY + ALTO_JUGADOR*0.35, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(jugadorX + ANCHO_JUGADOR*0.65, jugadorY + ALTO_JUGADOR*0.32, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(jugadorX + ANCHO_JUGADOR*0.25, jugadorY + ALTO_JUGADOR*0.32, 2, 0, Math.PI*2);
      ctx.fill();
      // sonrisa
      ctx.beginPath();
      ctx.arc(jugadorX + ANCHO_JUGADOR/2, jugadorY + ALTO_JUGADOR*0.65, 8, 0.05, Math.PI - 0.05);
      ctx.strokeStyle = "#8B5A2B";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    
    function dibujarDepredador() {
      ctx.shadowColor = "#5a0000";
      ctx.shadowBlur = 10;
      // Depredador rojo oscuro/violeta amenazante
      const grad = ctx.createLinearGradient(depredadorX, depredadorY, depredadorX + ANCHO_DEPREDADOR, depredadorY + ALTO_DEPREDADOR);
      grad.addColorStop(0, '#A12A2A');
      grad.addColorStop(1, '#5C1A1A');
      ctx.fillStyle = grad;
      ctx.fillRect(depredadorX, depredadorY, ANCHO_DEPREDADOR, ALTO_DEPREDADOR);
      ctx.strokeStyle = "#E68A2E";
      ctx.lineWidth = 2;
      ctx.strokeRect(depredadorX, depredadorY, ANCHO_DEPREDADOR, ALTO_DEPREDADOR);
      
      // Ojos amenazantes
      ctx.fillStyle = "#FF5E5E";
      ctx.beginPath();
      ctx.arc(depredadorX + ANCHO_DEPREDADOR*0.7, depredadorY + ALTO_DEPREDADOR*0.35, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(depredadorX + ANCHO_DEPREDADOR*0.3, depredadorY + ALTO_DEPREDADOR*0.35, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#1C1C1C";
      ctx.beginPath();
      ctx.arc(depredadorX + ANCHO_DEPREDADOR*0.72, depredadorY + ALTO_DEPREDADOR*0.33, 3.5, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(depredadorX + ANCHO_DEPREDADOR*0.32, depredadorY + ALTO_DEPREDADOR*0.33, 3.5, 0, Math.PI*2);
      ctx.fill();
      
      // cejas furiosas
      ctx.beginPath();
      ctx.strokeStyle = "#FFB347";
      ctx.lineWidth = 4;
      ctx.moveTo(depredadorX + ANCHO_DEPREDADOR*0.55, depredadorY + ALTO_DEPREDADOR*0.2);
      ctx.lineTo(depredadorX + ANCHO_DEPREDADOR*0.75, depredadorY + ALTO_DEPREDADOR*0.15);
      ctx.stroke();
      ctx.moveTo(depredadorX + ANCHO_DEPREDADOR*0.45, depredadorY + ALTO_DEPREDADOR*0.2);
      ctx.lineTo(depredadorX + ANCHO_DEPREDADOR*0.25, depredadorY + ALTO_DEPREDADOR*0.15);
      ctx.stroke();
      
      // colmillos
      ctx.fillStyle = "#F4E4C1";
      ctx.beginPath();
      ctx.moveTo(depredadorX + ANCHO_DEPREDADOR*0.45, depredadorY + ALTO_DEPREDADOR*0.7);
      ctx.lineTo(depredadorX + ANCHO_DEPREDADOR*0.52, depredadorY + ALTO_DEPREDADOR*0.85);
      ctx.lineTo(depredadorX + ANCHO_DEPREDADOR*0.6, depredadorY + ALTO_DEPREDADOR*0.7);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(depredadorX + ANCHO_DEPREDADOR*0.6, depredadorY + ALTO_DEPREDADOR*0.7);
      ctx.lineTo(depredadorX + ANCHO_DEPREDADOR*0.67, depredadorY + ALTO_DEPREDADOR*0.85);
      ctx.lineTo(depredadorX + ANCHO_DEPREDADOR*0.75, depredadorY + ALTO_DEPREDADOR*0.7);
      ctx.fill();
      
      ctx.shadowBlur = 0;
    }
    
    function actualizarCanvas() {
      if(!juegoActivo) return;
      dibujarFondo();
      dibujarJugador();
      dibujarDepredador();
    }
    
    // ----- COLISIÓN (GAME OVER) -----
    function verificarColision() {
      if (!juegoActivo) return false;
      if (jugadorX < depredadorX + ANCHO_DEPREDADOR &&
          jugadorX + ANCHO_JUGADOR > depredadorX &&
          jugadorY < depredadorY + ALTO_DEPREDADOR &&
          jugadorY + ALTO_JUGADOR > depredadorY) {
        
        juegoActivo = false;
        if (intervaloJuego) clearInterval(intervaloJuego);
        if (intervaloPersecucion) clearInterval(intervaloPersecucion);
        mensajeDiv.innerText = "💀 GAME OVER 💀 ¡El cazador te alcanzó!";
        mensajeDiv.style.color = "#ff9999";
        mensajeDiv.style.textShadow = "0 0 6px darkred";
        ctx.font = "bold 38px 'Segoe UI'";
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#FFAA77";
        ctx.shadowColor = "black";
        ctx.fillText("GAME OVER", CANVAS_W/2-125, CANVAS_H/2);
        return true;
      }
      return false;
    }
    
    // ----- MOVIMIENTO DE PERSECUCIÓN (DEPREDADOR INTELIGENTE PERO NO DEMASIADO RÁPIDO) -----
    function moverDepredadorPersecucion() {
      if (!juegoActivo) return;
      
      // Vector hacia el jugador (centro del jugador)
      let centroJugadorX = jugadorX + ANCHO_JUGADOR / 2;
      let centroJugadorY = jugadorY + ALTO_JUGADOR / 2;
      let centroDepX = depredadorX + ANCHO_DEPREDADOR / 2;
      let centroDepY = depredadorY + ALTO_DEPREDADOR / 2;
      
      let dx = centroJugadorX - centroDepX;
      let dy = centroJugadorY - centroDepY;
      let distancia = Math.hypot(dx, dy);
      
      if (distancia > 0.1) {
        let movX = (dx / distancia) * VEL_DEPREDADOR;
        let movY = (dy / distancia) * VEL_DEPREDADOR;
        
        let nuevaX = depredadorX + movX;
        let nuevaY = depredadorY + movY;
        
        // Limitar bordes
        depredadorX = Math.min(Math.max(nuevaX, 0), CANVAS_W - ANCHO_DEPREDADOR);
        depredadorY = Math.min(Math.max(nuevaY, 0), CANVAS_H - ALTO_DEPREDADOR);
      }
      
      actualizarCanvas();
      verificarColision();
    }
    
    // ----- MOVIMIENTO DEL JUGADOR (teclado / botones) -----
    function moverJugador(dx, dy) {
      if (!juegoActivo) return false;
      let nuevaX = jugadorX + dx;
      let nuevaY = jugadorY + dy;
      if (nuevaX >= 0 && nuevaX + ANCHO_JUGADOR <= CANVAS_W) {
        jugadorX = nuevaX;
      }
      if (nuevaY >= 0 && nuevaY + ALTO_JUGADOR <= CANVAS_H) {
        jugadorY = nuevaY;
      }
      actualizarCanvas();
      if(verificarColision()) return false;
      return true;
    }
    
    // ----- TEMPORIZADOR Y PUNTOS (tiempo + acumulación dinámica) -----
    function actualizarTiempoYPuntos() {
      if (!juegoActivo) return;
      
      if (tiempoRestante <= 0) {
        // Victoria!
        juegoActivo = false;
        if (intervaloJuego) clearInterval(intervaloJuego);
        if (intervaloPersecucion) clearInterval(intervaloPersecucion);
        mensajeDiv.innerText = "🏆 ¡VICTORIA! Sobreviviste a la persecución 🏆";
        mensajeDiv.style.color = "#FFE484";
        ctx.font = "bold 38px 'Segoe UI'";
        ctx.fillStyle = "gold";
        ctx.fillText("¡TÚ GANAS!", CANVAS_W/2-115, CANVAS_H/2);
        return;
      }
      
      tiempoRestante--;
      tiempoSpan.innerText = tiempoRestante;
      // Puntos: base por tiempo + bonificación extra por distancia al depredador (más riesgo = más puntos)
      let centroJugadorX = jugadorX + ANCHO_JUGADOR / 2;
      let centroJugadorY = jugadorY + ALTO_JUGADOR / 2;
      let centroDepX = depredadorX + ANCHO_DEPREDADOR / 2;
      let centroDepY = depredadorY + ALTO_DEPREDADOR / 2;
      let distancia = Math.hypot(centroJugadorX - centroDepX, centroJugadorY - centroDepY);
      let bonusDistancia = Math.floor(Math.max(0, distancia / 12));
      let puntosGanados = 12 + bonusDistancia;
      puntos += puntosGanados;
      puntosSpan.innerText = puntos;
      
      actualizarCanvas();
      verificarColision();
    }
    
    // ----- REINICIO COMPLETO DEL JUEGO -----
    function reiniciarJuego() {
      if (intervaloJuego) clearInterval(intervaloJuego);
      if (intervaloPersecucion) clearInterval(intervaloPersecucion);
      
      juegoActivo = true;
      puntos = 0;
      tiempoRestante = 25;
      puntosSpan.innerText = "0";
      tiempoSpan.innerText = "25";
      mensajeDiv.innerText = "";
      mensajeDiv.style.color = "#ffbb77";
      
      // Posición inicial del jugador (centro)
      jugadorX = (CANVAS_W / 2) - (ANCHO_JUGADOR / 2);
      jugadorY = (CANVAS_H / 2) - (ALTO_JUGADOR / 2);
      
      // Depredador: ubicación aleatoria pero razonablemente lejos para dar oportunidad
      let separado = false;
      let intentos = 0;
      while(!separado && intentos < 40) {
        depredadorX = Math.random() * (CANVAS_W - ANCHO_DEPREDADOR);
        depredadorY = Math.random() * (CANVAS_H - ALTO_DEPREDADOR);
        let centroJ = { x: jugadorX + ANCHO_JUGADOR/2, y: jugadorY + ALTO_JUGADOR/2 };
        let centroD = { x: depredadorX + ANCHO_DEPREDADOR/2, y: depredadorY + ALTO_DEPREDADOR/2 };
        let dist = Math.hypot(centroJ.x - centroD.x, centroJ.y - centroD.y);
        if(dist > 160) separado = true;
        intentos++;
      }
      if(!separado) {
        depredadorX = 15;
        depredadorY = 15;
      }
      
      // Verificar que no colisionen al inicio
      if (jugadorX < depredadorX + ANCHO_DEPREDADOR && jugadorX + ANCHO_JUGADOR > depredadorX &&
          jugadorY < depredadorY + ALTO_DEPREDADOR && jugadorY + ALTO_JUGADOR > depredadorY) {
        depredadorX = 5;
        depredadorY = 8;
      }
      
      actualizarCanvas();
      
      // Intervalo de persecución del depredador (más fluido, actualización cada 50ms para movimiento suave)
      intervaloPersecucion = setInterval(() => {
        moverDepredadorPersecucion();
      }, 50);  // persecución constante pero velocidad VEL_DEPREDADOR justa
      
      // Intervalo de tiempo y puntos (cada segundo)
      intervaloJuego = setInterval(() => {
        actualizarTiempoYPuntos();
      }, 1000);
    }
    
    // ----- MANEJADORES TECLADO -----
    function manejarTeclado(e) {
      if (!juegoActivo) return;
      const key = e.key;
      let dx = 0, dy = 0;
      switch(key) {
        case 'ArrowUp': dy = -VEL_JUGADOR; break;
        case 'ArrowDown': dy = VEL_JUGADOR; break;
        case 'ArrowLeft': dx = -VEL_JUGADOR; break;
        case 'ArrowRight': dx = VEL_JUGADOR; break;
        default: return;
      }
      e.preventDefault();
      moverJugador(dx, dy);
    }
    
    function setupBotones() {
      const btns = document.querySelectorAll('.ctrl-btn');
      btns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (!juegoActivo) return;
          const dir = btn.getAttribute('data-dir');
          let dx = 0, dy = 0;
          switch(dir) {
            case 'up': dy = -VEL_JUGADOR; break;
            case 'down': dy = VEL_JUGADOR; break;
            case 'left': dx = -VEL_JUGADOR; break;
            case 'right': dx = VEL_JUGADOR; break;
          }
          moverJugador(dx, dy);
          e.stopPropagation();
        });
      });
    }
    
    function iniciarJuego() {
      reiniciarJuego();
      setupBotones();
      window.addEventListener('keydown', manejarTeclado);
      window.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
          if (e.target === document.body || e.target === document.documentElement) {
            e.preventDefault();
          }
        }
      });
      const resetBtn = document.getElementById('resetGameBtn');
      if(resetBtn) resetBtn.addEventListener('click', () => reiniciarJuego());
    }
    
    iniciarJuego();
  })();
</script>
</body>
</html>
